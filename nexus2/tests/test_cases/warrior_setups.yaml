    symbol: ACON
    setup_type: pmh
    outcome: winner
    description: "ACON Jan 8 2025 - Ross traded PMH breakout, +42% gap"
    trade_date: "2025-01-08"
    ross_pnl: 9293.09  # TARGET TO MATCH/BEAT
    premarket_data:
      gap_percent: 42.1
      volume: 43000000
      float_shares: null  # Low float
      catalyst: "news"
      previous_close: 1.50
      premarket_high: 2.20
    expected:
      entry_near: 2.25  # PMH breakout
      stop_near: 2.10   # Below PMH
      mental_stop_cents: 15
