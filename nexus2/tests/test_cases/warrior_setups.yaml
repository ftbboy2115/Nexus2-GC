# ==========================================================================
# USAGE:
# 
# 1. Load a test case:
#    POST /warrior/sim/load_test_case?case_id=acon_2025_01_08
#
# 2. This will:
#    - Set MockBroker prices based on premarket_data
#    - Set simulated gap, volume, float
#    - Run scanner to verify it would catch the stock
#
# 3. Run scanner to see if it detects the setup
# 4. Execute trade via WarriorEngine
# 5. Compare outcome vs expected
# ==========================================================================

# ==========================================================================
# SYNTHETIC WARRIOR LOSERS (for testing stop execution)
# ==========================================================================

  - id: synthetic_warrior_loser
    symbol: WLSR
    setup_type: pmh
    outcome: loser
    synthetic: true
    description: "Synthetic PMH loser - gap up then fails at PMH"
    trade_date: "2025-01-01"
    synthetic_config:
      premarket_high: 5.00
      open_price: 5.10  # Breaks PMH
      entry_fill: 5.10
      mental_stop: 4.95  # 15 cents below entry
      price_path:
        - { minute: 1, price: 5.15 }  # Looks good...
        - { minute: 2, price: 5.08 }  # Fading
        - { minute: 3, price: 4.98 }  # Below entry
        - { minute: 4, price: 4.90 }  # MENTAL STOP HIT
    expected:
      entry_near: 5.10
      stop_near: 4.95
      loss_pct: -3.0
    notes: "Tests mental stop execution at 15 cents"

  - id: synthetic_warrior_winner
    symbol: WWNR
    setup_type: pmh
    outcome: winner
    synthetic: true
    description: "Synthetic PMH winner - clean 2R move"
    trade_date: "2025-01-01"
    synthetic_config:
      premarket_high: 5.00
      open_price: 5.10
      entry_fill: 5.10
      mental_stop: 4.95  # 15 cents
      profit_target: 5.40  # 2R = 30 cents
      price_path:
        - { minute: 1, price: 5.20 }
        - { minute: 2, price: 5.30 }
        - { minute: 3, price: 5.45 }  # TARGET HIT
    expected:
      entry_near: 5.10
      profit_target: 5.40
      partial_exit_price: 5.40
      win_pct: 6.0
    notes: "Tests partial at 2R, stop to breakeven"
