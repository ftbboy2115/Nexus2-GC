# Warrior Trading (Ross Cameron) Test Cases
# 
# Known setups for validating Warrior scanner and execution logic.
# Each case includes:
#   - Symbol and date
#   - Setup type (orb, pmh, both)
#   - Ross's actual P&L (target to match/beat)
#   - Entry and stop levels for validation
#   - Pre-market data for scanner validation

test_cases:
  # ==========================================================================
  # ROSS CAMERON TRADES - January 8, 2025
  # ==========================================================================
  
