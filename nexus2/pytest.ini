[pytest]
# Timeout per test (seconds) - prevents hangs
timeout = 5

# Test discovery
testpaths = tests
python_files = test_*.py
python_functions = test_*

# Output options
addopts = -v --tb=short

# Disable network access in tests by default
# (mocks should be used instead)
filterwarnings =
    ignore::DeprecationWarning
