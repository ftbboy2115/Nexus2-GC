[pytest]
# Timeout per test (seconds) - prevents hangs
timeout = 60
# Use thread-based timeout - compatible with async/FastAPI TestClient
timeout_method = thread

# Test discovery
testpaths = tests
python_files = test_*.py
python_functions = test_*

# Output options
addopts = -v --tb=short

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')

# Disable network access in tests by default
# (mocks should be used instead)
filterwarnings =
    ignore::DeprecationWarning
